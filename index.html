<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PediCalc Pro v1.51</title>

<meta name="theme-color" content="#2563eb">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<div class="logo-container">
<div class="logo-icon">🩺</div>
</div>

<h1>PediCalc Pro</h1>

<p class="subtitle">
Calculadora Pediátrica Inteligente
</p>

</div>

<div class="tabs">

<button
class="tab-btn active"
onclick="mostrarTab('medicamentos')">
💊 Medicamentos
</button>

<button
class="tab-btn"
onclick="mostrarTab('mantenimiento')">
💧 Mantenimiento
</button>

<button
class="tab-btn"
onclick="mostrarTab('deshidratacion')">
🚑 Deshidratación
</button>

</div>

<!-- ========================= -->
<!-- MEDICAMENTOS -->
<!-- ========================= -->

<div id="medicamentos-tab">

<div class="form-group">

<label for="peso">
Peso del paciente
</label>

<input
id="peso"
type="number"
step="0.1"
placeholder="Ejemplo: 15.5 kg">

</div>

<div class="form-group">

<label for="buscar">
Buscar medicamento
</label>

<input
id="buscar"
type="text"
placeholder="Escriba el nombre del medicamento">

</div>

<div class="form-group">

<label for="medicamento">
Medicamento
</label>

<select id="medicamento">

<option value="">
Cargando medicamentos...
</option>

</select>

</div>

<button onclick="calcular()">
CALCULAR DOSIS
</button>

<div id="resultado"></div>

</div>

<!-- ========================= -->
<!-- MANTENIMIENTO -->
<!-- ========================= -->

<div
id="mantenimiento-tab"
style="display:none;">

<div class="form-group">

<label for="pesoMantenimiento">
Peso del paciente
</label>

<input
id="pesoMantenimiento"
type="number"
step="0.1"
placeholder="Ejemplo: 15 kg">

</div>

<button onclick="calcularMantenimiento()">
CALCULAR LÍQUIDOS
</button>

<div id="resultadoMantenimiento"></div>

</div>

<!-- ========================= -->
<!-- DESHIDRATACIÓN -->
<!-- ========================= -->

<div
id="deshidratacion-tab"
style="display:none;">

<div class="form-group">

<label for="pesoDeshidratacion">
Peso del paciente
</label>

<input
id="pesoDeshidratacion"
type="number"
step="0.1"
placeholder="Ejemplo: 15 kg">

</div>

<div class="form-group">

<label for="porcentaje">
Porcentaje de deshidratación
</label>

<input
id="porcentaje"
type="number"
step="0.1"
placeholder="Ejemplo: 5">

</div>

<button onclick="calcularDeshidratacion()">
CALCULAR REPOSICIÓN
</button>

<div id="resultadoDeshidratacion"></div>

</div>

</div>

<div class="version">

PediCalc Pro v1.51

</div>

</div>

<script src="app.js"></script>

</body>

</html>
